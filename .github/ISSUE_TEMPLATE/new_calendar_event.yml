name: New Calendar Event
description: Submit a calendar entry to be added to the site
title: "[Calendar] <Short title>"
labels:
  - calendar
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: Event title as it should appear on the calendar
      placeholder: WG Meeting – Search & Harvesting
    validations:
      required: true
  - type: input
    id: date
    attributes:
      label: Date (YYYY-MM-DD)
      description: "Date of the event (Berlin time), e.g., 2025-10-01"
      placeholder: "2025-10-01"
    validations:
      required: true
  - type: input
    id: start_time
    attributes:
      label: Start time (HH:MM)
      description: "Start (Berlin time), e.g., 09:00"
      placeholder: "09:00"
  - type: input
    id: end_time
    attributes:
      label: End time (HH:MM)
      description: "End (Berlin time), e.g., 10:00"
      placeholder: "10:00"
  - type: dropdown
    id: allDay
    attributes:
      label: All day event?
      options: ["false", "true"]
      default: 0
  - type: input
    id: location
    attributes:
      label: Location
      description: e.g. Online, or venue
      placeholder: Online
  - type: input
    id: url
    attributes:
      label: Link (optional)
      description: URL opened when clicking the event (meeting page, registration, etc.)
      placeholder: https://...
  - type: input
    id: website
    attributes:
      label: event.website (optional)
      description: URL of the event's official website
      placeholder: https://...
  - type: input
    id: type
    attributes:
      label: Type
      description: Category used for filtering (e.g., WG, TF, consortium)
      placeholder: WG
  # Options sourced from static/calendar-organisers.json
  - type: dropdown
    id: organiser
    attributes:
      label: Organiser
      description: Select the organiser responsible for this event
      options:
        - WG Onto (Section-Meta)
        - WG Terminology Services (Section-Meta)
        - WG ELN (Section Infra)
        - WG Dalia (Section Edu)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Short description shown in tooltip/modal
      placeholder: Short description of the meeting
